name: publish-horror-short

on:
  schedule:
    # Twice a day. Times are UTC. These two slots land in US evening (~7pm ET)
    # and South/Southeast Asia evening (~7pm IST) — adjust to match where you
    # expect your actual audience to be once you have real Analytics data.
    - cron: "30 23 * * *"   # 23:30 UTC = 7:30pm US Eastern
    - cron: "30 13 * * *"   # 13:30 UTC = 7:00pm IST
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore state (history + token)
        run: |
          mkdir -p state
          echo "${{ secrets.YOUTUBE_TOKEN_JSON }}" > token.json

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/pipeline.py

      - name: Persist run history back to the repo
        if: always()
        run: |
          git config user.name "horror-shorts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/history.json || true
          git diff --cached --quiet || git commit -m "update story history [skip ci]"
          git push || true

      - name: Upload run artifacts (story.json, images, video) for manual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output
          path: output/
          retention-days: 14
